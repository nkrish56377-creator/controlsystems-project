<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parking System</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="bg-grid"></div>
    <div class="bg-glow"></div>

    <!-- ── LOGIN OVERLAY ── -->
    <div id="login-overlay">
        <div id="login-box">
            <div class="login-icon">🚗</div>
            <h2>PARKING SYSTEM</h2>
            <p class="login-sub">Smart Dashboard — Admin Access</p>

            <div class="input-group">
                <label>USERNAME</label>
                <input type="text" id="username" placeholder="Enter username" autocomplete="off" />
            </div>
            <div class="input-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="Enter password" />
            </div>

            <p id="login-error"></p>
            <button id="login-btn">⚡ LOGIN</button>
            <div class="login-footer">SECURED ACCESS · Control Systems IoT PROJECT</div>
        </div>
    </div>

    <!-- ── DASHBOARD ── -->
    <div id="dashboard" style="display:none">
        <h1>🚗 Virtual Parking System</h1>
        <p style="color:#94a3b8;">Smart IoT Parking Dashboard</p>

        <div class="controls">
            <button id="bookButton">⚡ Book Slot</button>
            <button id="resetButton">🔄 Reset Parking</button>
            <button id="logoutButton">🔒 Logout</button>
            <p id="message"></p>
        </div>

        <div id="parking-lot" class="parking-lot"></div>
    </div>

    <script src="script.js"></script>
    <script>
        const ADMIN_USER = 'admin';
        const ADMIN_PASS = 'parking123';

        const overlay   = document.getElementById('login-overlay');
        const dashboard = document.getElementById('dashboard');
        const loginBtn  = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logoutButton');
        const errorEl   = document.getElementById('login-error');
        const userInput = document.getElementById('username');
        const passInput = document.getElementById('password');

        // Start with dashboard fully hidden
        dashboard.style.display = 'none';

        // Auto-login if session active
        if (sessionStorage.getItem('parking-auth') === 'true') {
            overlay.style.display = 'none';
            dashboard.style.display = 'block';
        }

        function showDashboard() {
            overlay.classList.add('fade-out');
            setTimeout(() => {
                overlay.style.display = 'none';
                dashboard.style.display = 'block';
                dashboard.classList.add('dash-in');
            }, 700);
        }

        function attemptLogin() {
            const u = userInput.value.trim();
            const p = passInput.value;

            if (u === ADMIN_USER && p === ADMIN_PASS) {
                sessionStorage.setItem('parking-auth', 'true');
                errorEl.textContent = '';
                loginBtn.textContent = '✔ ACCESS GRANTED';
                loginBtn.style.borderColor = 'rgba(34,197,94,0.7)';
                loginBtn.style.color = '#4ade80';
                loginBtn.style.boxShadow = '0 0 28px rgba(34,197,94,0.5)';
                setTimeout(showDashboard, 700);
            } else {
                errorEl.textContent = '⚠ Invalid credentials';
                const box = document.getElementById('login-box');
                box.classList.remove('shake');
                void box.offsetWidth;
                box.classList.add('shake');
                passInput.value = '';
                passInput.focus();
            }
        }

        loginBtn.addEventListener('click', attemptLogin);
        [userInput, passInput].forEach(el => {
            el.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });
        });

        logoutBtn.addEventListener('click', () => {
            sessionStorage.removeItem('parking-auth');
            location.reload();
        });
    </script>
</body>
</html>
